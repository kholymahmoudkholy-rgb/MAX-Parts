<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Saira:wght@400;500;600;700;800;900&amp;family=Montserrat:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
</helmet>

<div style="position:relative;width:960px;height:600px;background:#0C1424;overflow:hidden;font-family:'Montserrat',system-ui,sans-serif;color:#fff">

  <!-- category color zone (angled) -->
  <div style="position:absolute;top:0;right:0;bottom:0;width:45%;background:{{ color }};clip-path:polygon(30% 0,100% 0,100% 100%,0 100%)"></div>
  <div style="position:absolute;top:0;right:0;bottom:0;width:45%;background:rgba(0,0,0,.18);clip-path:polygon(50% 0,60% 0,20% 100%,10% 100%)"></div>
  <div style="position:absolute;top:0;bottom:0;left:0;width:6px;background:{{ color }}"></div>

  <div style="position:absolute;inset:0;display:flex">

    <!-- LEFT: navy zone -->
    <div style="flex:1.42;display:flex;flex-direction:column;padding:42px 34px 30px 50px;min-width:0">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:16px">
        <span style="display:inline-block;background:{{ color }};color:#fff;font-family:'Saira',sans-serif;font-weight:700;font-size:12.5px;letter-spacing:.18em;text-transform:uppercase;padding:6px 13px">{{ lineName }}</span>
        <span style="font-family:'Saira',sans-serif;font-size:12.5px;font-weight:500;letter-spacing:.22em;color:rgba(255,255,255,.5)">{{ partNo }}</span>
      </div>

      <div style="margin-top:24px">
        <h1 style="margin:0;font-family:'Saira',sans-serif;font-weight:800;text-transform:uppercase;font-size:52px;line-height:.94;letter-spacing:-.01em;color:#fff">{{ productName }}</h1>
        <div style="margin-top:16px;display:flex;align-items:center;gap:12px">
          <span style="width:30px;height:2px;background:{{ color }};flex-shrink:0"></span>
          <span style="font-family:'Saira',sans-serif;font-weight:600;font-size:14.5px;letter-spacing:.1em;text-transform:uppercase;color:{{ color }}">{{ tagline }}</span>
        </div>
      </div>

      <!-- product shot -->
      <div style="flex:1;position:relative;margin:10px 0 14px;min-height:0">
        <sc-if value="{{ noImg }}" hint-placeholder-val="{{ true }}">
          <x-import component-from-global-scope="image-slot" from="./image-slot.js" id="{{ slotId }}" placeholder="PRODUCT SHOT" shape="rect" fit="contain" hint-size="100%,100%" style="position:absolute;inset:0;width:100%;height:100%"></x-import>
        </sc-if>
        <sc-if value="{{ hasImg }}" hint-placeholder-val="{{ false }}">
          <img src="{{ productImg }}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:contain;object-position:center;mix-blend-mode:screen;filter:drop-shadow(0 18px 26px rgba(0,0,0,.55))">
        </sc-if>
      </div>

      <!-- feature badges -->
      <div style="display:flex;gap:30px">
        <div style="display:flex;flex-direction:column;align-items:center;gap:9px;width:78px">
          <div style="width:54px;height:54px;border-radius:50%;border:1px solid rgba(255,255,255,.28);display:flex;align-items:center;justify-content:center"><img src="assets/ic-oe.png" style="width:26px;height:auto;mix-blend-mode:screen"></div>
          <span style="font-family:'Saira',sans-serif;font-weight:600;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:#B9C2CF;text-align:center;line-height:1.25">OE Quality</span>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:9px;width:78px">
          <div style="width:54px;height:54px;border-radius:50%;border:1px solid rgba(255,255,255,.28);display:flex;align-items:center;justify-content:center"><img src="assets/ic-longlife.png" style="width:26px;height:auto;mix-blend-mode:screen"></div>
          <span style="font-family:'Saira',sans-serif;font-weight:600;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:#B9C2CF;text-align:center;line-height:1.25">Long Life</span>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:9px;width:78px">
          <div style="width:54px;height:54px;border-radius:50%;border:1px solid rgba(255,255,255,.28);display:flex;align-items:center;justify-content:center"><img src="assets/ic-safety.png" style="width:26px;height:auto;mix-blend-mode:screen"></div>
          <span style="font-family:'Saira',sans-serif;font-weight:600;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:#B9C2CF;text-align:center;line-height:1.25">Safety Tested</span>
        </div>
      </div>
    </div>

    <!-- RIGHT: color zone content -->
    <div style="flex:1;position:relative;display:flex;flex-direction:column;align-items:center;padding:44px 30px 36px;text-align:center">
      <div style="flex:1;display:flex;align-items:center;justify-content:center;width:100%">
        <img src="assets/logo-white-full.png" alt="MAX Auto Parts" style="width:172px;height:auto;display:block">
      </div>
      <div style="width:100%;display:flex;flex-direction:column;align-items:center;gap:11px">
        <div style="background:#fff;padding:9px 13px 6px;display:inline-flex;flex-direction:column;align-items:center;gap:5px">
          <div style="display:flex;align-items:flex-end;height:42px;gap:0">
            <sc-for list="{{ bars }}" as="bar" hint-placeholder-count="26">
              <span style="height:100%;background:{{ bar.bg }};width:{{ bar.wpx }}"></span>
            </sc-for>
          </div>
          <span style="font-family:'Saira',sans-serif;font-weight:600;font-size:10px;letter-spacing:.28em;color:#0C1424">{{ partNo }}</span>
        </div>
        <span style="font-family:'Saira',sans-serif;font-weight:500;font-size:9.5px;letter-spacing:.13em;text-transform:uppercase;color:rgba(255,255,255,.78);max-width:200px;line-height:1.4">Meets or exceeds OEM specifications</span>
      </div>
    </div>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:960,&quot;height&quot;:600},&quot;color&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#E20613&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;lineName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Suspension&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;productName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Shock Absorber&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;partNo&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;MAX-1201&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;tagline&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Superior control. Smoother ride.&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;productImg&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;slotId&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;max-pkg-shot&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props;
    const partNo = p.partNo || 'MAX-1201';
    // deterministic barcode pattern from the part number
    let h = 2166136261 >>> 0;
    for (const ch of partNo) { h ^= ch.charCodeAt(0); h = Math.imul(h, 16777619) >>> 0; }
    const bars = [];
    for (let i = 0; i < 46; i++) {
      h = (Math.imul(h, 1103515245) + 12345) >>> 0;
      const w = 1 + (h % 4);
      const on = i % 2 === 0;
      bars.push({ wpx: w + 'px', bg: on ? '#0C1424' : '#ffffff' });
    }
    const productImg = p.productImg || '';
    return {
      color: p.color || '#E20613',
      lineName: p.lineName || 'Suspension',
      productName: p.productName || 'Shock Absorber',
      partNo,
      tagline: p.tagline || 'Superior control. Smoother ride.',
      productImg,
      hasImg: !!productImg,
      noImg: !productImg,
      slotId: p.slotId || 'max-pkg-shot',
      bars,
    };
  }
}
</script>
</body>
</html>
